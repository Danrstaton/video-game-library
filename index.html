const TIER = (score) => {
  if (score >= 100) return { label: 'Masterpiece', color: '#d4a574' };
  if (score >= 90)  return { label: 'Amazing',     color: '#c4b8a8' };
  if (score >= 80)  return { label: 'Great',       color: '#9ea0a8' };
  if (score >= 70)  return { label: 'Good',        color: '#7d7f88' };
  return { label: 'Mixed', color: '#6d6f78' };
};

const STATE_META = {
  played:   { label: 'Played',   verb: 'rated' },
  playing:  { label: 'Playing',  verb: 'currently playing' },
  tracking: { label: 'Tracking', verb: 'upcoming' },
  rumored:  { label: 'Rumored',  verb: 'no date yet' },

// Deterministic hash for generative gradients
const hash = (str) => {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
  return Math.abs(h);
};

// Platform-tinted gradient base
const PLATFORM_PALETTES = {
  'PS5':       [['#1e3a8a','#312e81'], ['#1e40af','#0f172a'], ['#312e81','#0f172a']],
  'PS4':       [['#1e3a8a','#0f172a'], ['#0c4a6e','#1e293b']],
  'PS3':       [['#164e63','#0f172a'], ['#155e75','#1e293b']],
  'Switch':    [['#7f1d1d','#1c1917'], ['#9f1239','#171717'], ['#881337','#1c1917']],
  'Switch 2':  [['#991b1b','#18181b'], ['#b91c1c','#1c1917']],
  'Wii':       [['#7c2d12','#1c1917'], ['#92400e','#1c1917']],
  'N64':       [['#365314','#1c1917'], ['#3f6212','#0f172a']],
  'DS':        [['#1e1b4b','#0c0a09'], ['#312e81','#1c1917']],
  'GBA':       [['#854d0e','#1c1917'], ['#92400e','#0c0a09']],
  'Gameboy':   [['#3f6212','#0c0a09'], ['#365314','#1c1917']],
};
const DEFAULT_PALETTE = [['#27272a','#09090b'], ['#3f3f46','#18181b']];

const gradientFor = (game) => {
  const palettes = PLATFORM_PALETTES[game.platform] || DEFAULT_PALETTE;
  const [a, b] = palettes[hash(game.title) % palettes.length];
  const angle = 120 + (hash(game.title) % 80); // 120-200 deg
  return `linear-gradient(${angle}deg, ${a} 0%, ${b} 100%)`;
};

// Parse upcoming dates into sortable order
const parseExpected = (s) => {
  if (!s) return { sortKey: 9999, label: 'TBD' };
  if (s === 'Available') return { sortKey: 0, label: 'Available now' };
  // M/D format → assume current/next year contextually (2026)
  const md = s.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (md) {
    const m = parseInt(md[1], 10), d = parseInt(md[2], 10);
    return { sortKey: 2026 * 10000 + m * 100 + d, label: `${MONTHS[m-1]} ${d}, 2026` };
  }
  // "H1 2026" / "Fall 2026"
  const h1 = s.match(/^H(\d)\s+(\d{4})$/);
  if (h1) return { sortKey: parseInt(h1[2]) * 10000 + (h1[1] === '1' ? 300 : 900), label: s };
  const season = s.match(/^(Spring|Summer|Fall|Winter)\s+(\d{4})$/);
  if (season) {
    const offsets = { Spring: 300, Summer: 600, Fall: 900, Winter: 1200 };
    return { sortKey: parseInt(season[2]) * 10000 + offsets[season[1]], label: s };
  }
  // Year only
  const y = s.match(/^(\d{4})$/);
  if (y) return { sortKey: parseInt(y[1]) * 10000 + 9999, label: s };
  return { sortKey: 9999, label: s };
};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ---- Spider chart (custom SVG) ----
const SpiderChart = ({ rating, color = '#d4a574', size = 280 }) => {
  const cx = size / 2, cy = size / 2;
  const radius = size * 0.32;
  const N = CATEGORIES.length;
  const labelR = radius + size * 0.085;
  // Pad the viewBox so axis labels can sit outside the radius without clipping
  const padX = 56, padY = 16;

  const point = (i, value) => {
    const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
    const r = (value / 10) * radius;
    return [cx + Math.cos(angle) * r, cy + Math.sin(angle) * r];
  };

  const dataPoints = CATEGORIES.map((c, i) => point(i, rating[c.key]));
  const polyStr = dataPoints.map(p => p.join(',')).join(' ');

  const rings = [2, 4, 6, 8, 10];

  return (
    <svg viewBox={`${-padX} ${-padY} ${size + padX * 2} ${size + padY * 2}`} className="w-full h-auto">
      {/* Background rings */}
      {rings.map(v => {
        const pts = Array.from({ length: N }, (_, i) => point(i, v));
        return (
          <polygon
            key={v}
            points={pts.map(p => p.join(',')).join(' ')}
            fill="none"
            stroke="rgba(255,255,255,0.06)"
            strokeWidth="1"
          />
        );
      })}
      {/* Axis lines */}
      {CATEGORIES.map((c, i) => {
        const [x, y] = point(i, 10);
        return <line key={c.key} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />;
      })}
      {/* Data polygon */}
      <polygon
        points={polyStr}
        fill={color}
        fillOpacity="0.18"
        stroke={color}
        strokeWidth="1.5"
        strokeLinejoin="round"
      />
      {/* Data dots */}
      {dataPoints.map(([x, y], i) => (
        <circle key={i} cx={x} cy={y} r="2.5" fill={color} />
      ))}
      {/* Labels */}
      {CATEGORIES.map((c, i) => {
        const angle = (Math.PI * 2 * i) / N - Math.PI / 2;
        const lx = cx + Math.cos(angle) * labelR;
        const ly = cy + Math.sin(angle) * labelR;
        const anchor = Math.abs(Math.cos(angle)) < 0.3 ? 'middle' : (Math.cos(angle) > 0 ? 'start' : 'end');
        return (
          <text
            key={c.key}
            x={lx} y={ly}
            textAnchor={anchor}
            dominantBaseline="middle"
            fontSize="10"
            fontFamily="Inter"
            fontWeight="500"
            letterSpacing="0.5"
            fill="rgba(255,255,255,0.5)"
            style={{ textTransform: 'uppercase' }}
          >
            {c.label}
          </text>
        );
      })}
    </svg>
  );
};

        <div className="px-4 pt-6">
          <div className="glass rounded-3xl p-6">
            <div className="text-[11px] uppercase tracking-[0.2em] text-zinc-500 font-medium mb-2">State</div>
            <div className="serif text-2xl text-zinc-100">{STATE_META[game.state]?.label}</div>
            <div className="text-zinc-400 text-sm mt-1">{STATE_META[game.state]?.verb}</div>
            {game.expectedDate && (
              <div className="mt-4 pt-4 border-t border-white/5">
                <div className="text-[11px] uppercase tracking-[0.2em] text-zinc-500 font-medium">Expected</div>
                <div className="serif text-xl mt-1" style={{ color: '#d4a574' }}>
                  {parseExpected(game.expectedDate).label}
                </div>
              </div>
            )}
            {game.timeToBeat && (
              <div className="mt-4 pt-4 border-t border-white/5 flex items-center gap-2">
                <Icon name="clock" className="w-4 h-4 text-zinc-400" />
                <span className="text-sm text-zinc-300">~{game.timeToBeat} hours</span>
              </div>
            )}
            {game.notes && (
              <div className="mt-4 pt-4 border-t border-white/5">
                <div className="text-[11px] uppercase tracking-[0.2em] text-zinc-500 font-medium mb-1">Notes</div>
                <div className="text-sm text-zinc-300">{game.notes}</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

// ---- Upcoming screen ----
const UpcomingScreen = ({ games, onSelect }) => {
  const upcoming = useMemo(() => {
    const list = games.filter(g => g.state === 'tracking' || g.state === 'rumored');
    list.sort((a, b) => parseExpected(a.expectedDate).sortKey - parseExpected(b.expectedDate).sortKey);
    return list;
  }, [games]);

  // Group by year/bucket
  const groups = useMemo(() => {
    const buckets = {};
    upcoming.forEach(g => {
      let key = 'TBD';
      if (g.state === 'tracking' && g.expectedDate) {
        const sk = parseExpected(g.expectedDate).sortKey;
        if (sk === 0) key = 'Available now';
        else if (sk < 20270000) key = '2026';
        else if (sk < 20280000) key = '2027';
        else key = 'Later';
      }
      (buckets[key] = buckets[key] || []).push(g);
    });
    const order = ['Available now', '2026', '2027', 'Later', 'TBD'];
    return order.filter(k => buckets[k]).map(k => ({ key: k, games: buckets[k] }));
  }, [upcoming]);

  return (
    <div className="screen-enter pt-safe pb-32">
      <div className="px-4 pt-4 pb-2">
        <div className="text-[11px] uppercase tracking-[0.2em] text-zinc-500 font-medium">Release Calendar</div>
        <h1 className="serif text-[40px] leading-none mt-1">Upcoming</h1>
      </div>

      <div className="px-4 mt-4 space-y-6">
        {groups.map(group => (
          <div key={group.key}>
            <div className="serif text-[22px] mb-2 px-1" style={{ color: '#d4a574' }}>{group.key}</div>
            <div className="glass rounded-3xl overflow-hidden divide-y divide-white/5">
              {group.games.map(g => {
                const exp = parseExpected(g.expectedDate);
                return (
                  <button
                    key={g.id}
                    onClick={() => onSelect(g)}
                    className="w-full text-left px-4 py-3 flex items-center justify-between gap-3 hover:bg-white/5 active:bg-white/10 transition-colors"
                  >
                    <div className="min-w-0">
                      <div className="serif text-[17px] leading-tight truncate">{g.title}</div>
                      {g.notes && <div className="text-[12px] text-zinc-500 mt-0.5 truncate">{g.notes}</div>}
                    </div>
                    <div className="text-right shrink-0">
                      <div className="text-[12px] font-medium" style={{ color: g.state === 'rumored' ? '#71717a' : '#d4a574' }}>
                        {g.state === 'rumored' ? 'Rumored' : exp.label}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ---- News screen (placeholder for Phase 2) ----
const NewsScreen = () => (
  <div className="screen-enter pt-safe pb-32 px-4">
    <div className="pt-4 pb-2">
      <div className="text-[11px] uppercase tracking-[0.2em] text-zinc-500 font-medium">Daily Reader</div>
      <h1 className="serif text-[40px] leading-none mt-1">News</h1>
    </div>
    <div className="mt-8 glass rounded-3xl p-6">
      <div className="serif text-[24px] text-zinc-200">Coming in Phase 2</div>
      <p className="text-zinc-400 text-sm mt-2 leading-relaxed">
        A curated headline feed from Nintendo, PlayStation, Polygon, and Kinda Funny — scan in the morning,
        tap to read or listen in-app, link out as fallback.
      </p>
      <div className="mt-5 space-y-2">
        {['Nintendo Life', 'PlayStation Blog', 'Polygon', 'Kinda Funny Games (YouTube + podcast)'].map(s => (
          <div key={s} className="flex items-center gap-2 text-sm text-zinc-300">
            <span className="w-1 h-1 rounded-full bg-gold" />
            {s}
          </div>
        ))}
      </div>
    </div>
  </div>
);

// ---- Bottom tab bar ----
const TabBar = ({ active, onChange }) => {
  const tabs = [
    { id: 'library',  label: 'Library',  icon: 'library' },
    { id: 'upcoming', label: 'Upcoming', icon: 'upcoming' },
    { id: 'news',     label: 'News',     icon: 'news' },
  ];
  return (
    <div className="fixed bottom-0 left-0 right-0 pb-safe z-40">
      <div className="glass-strong px-2 pt-1.5 pb-1.5">
        <div className="flex">
          {tabs.map(t => {
            const on = active === t.id;
            return (
              <button
                key={t.id}
                onClick={() => onChange(t.id)}
                className="flex-1 flex flex-col items-center gap-0.5 py-1.5 rounded-xl transition-colors"
              >
                <Icon name={t.icon} className={`w-[22px] h-[22px] ${on ? 'text-white' : 'text-zinc-500'}`} />
                <span className={`text-[10px] font-medium ${on ? 'text-white' : 'text-zinc-500'}`}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
};

// =============================================================================
// APP
// =============================================================================

const App = () => {
  const [games, setGames] = useState(loadGames);
  const [tab, setTab] = useState('library');
  const [selectedId, setSelectedId] = useState(null);

  useEffect(() => { saveGames(games); }, [games]);

  const selected = useMemo(() => games.find(g => g.id === selectedId), [games, selectedId]);

  const updateGame = (id, patch) => {
    setGames(prev => prev.map(g => g.id === id ? { ...g, ...patch } : g));
  };

  return (
    <div className="min-h-screen bg-ink-950 text-zinc-100 max-w-md mx-auto relative">
      {selected ? (
        <GameDetailScreen game={selected} onBack={() => setSelectedId(null)} onUpdate={updateGame} />
      ) : (
        <>
          {tab === 'library'  && <LibraryScreen games={games} onSelect={g => setSelectedId(g.id)} />}
          {tab === 'upcoming' && <UpcomingScreen games={games} onSelect={g => setSelectedId(g.id)} />}
          {tab === 'news'     && <NewsScreen />}
          <TabBar active={tab} onChange={setTab} />
        </>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
